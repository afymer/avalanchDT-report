Services :
	real_time_viz_service
		type : Thing/DTComponent/Service/FidelityThing/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/NamedIndividual/ConceptInstance
		sameAs : real_time_viz_service
		HasVisualization : false
		atStage : operation
		enabledBy : docker_volume_sharing/godot
		provides : real_time_viz
	avalanche_danger_level_estimator
		type : Thing/DTComponent/Service/FidelityThing/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/NamedIndividual/ConceptInstance
		sameAs : avalanche_danger_level_estimator
		atStage : operation
		enabledBy : alpine3d/NNEstimator
		provides : avalanche_3d_simulation
	avalanche_simulation
		type : Thing/DTComponent/Service/FidelityThing/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/NamedIndividual/ConceptInstance
		sameAs : avalanche_simulation
		atStage : operation
		enabledBy : simulator
		provides : what_if_sim_results
	avalanche_prediction_service
		type : Thing/DTComponent/Service/FidelityThing/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/NamedIndividual/ConceptInstance
		sameAs : avalanche_prediction_service
		atStage : operation
		enabledBy : NNEstimator
		provides : future_avalanche_risk_estimation
Enablers :
	simulator
		type : Thing/DTComponent/Enabler/FidelityThing/ContainedElement/ImplementationThing/Component/DescribedThing/NamedIndividual/ConceptInstance
		sameAs : simulator
		enables : avalanche_simulation
		hasInput : pt_model/env_model/pt_and_env_model
	docker_volume_sharing
		type : Thing/DTComponent/Enabler/FidelityThing/ContainedElement/ImplementationThing/Component/DescribedThing/NamedIndividual/ConceptInstance
		sameAs : docker_volume_sharing
		enables : real_time_viz_service
		IsCommEnabler : true
	godot
		type : Thing/DTComponent/Enabler/FidelityThing/ContainedElement/ImplementationThing/Component/DescribedThing/NamedIndividual/ConceptInstance
		sameAs : godot
		enables : real_time_viz_service
	alpine3d
		type : Thing/DTComponent/Enabler/FidelityThing/ContainedElement/ImplementationThing/Component/DescribedThing/NamedIndividual/ConceptInstance
		sameAs : alpine3d
		enables : avalanche_danger_level_estimator
		hasInput : NN_model/alpine3d_interpolation_model/snow_profile_model
	NNEstimator
		type : Thing/DTComponent/Enabler/FidelityThing/ContainedElement/ImplementationThing/Component/DescribedThing/NamedIndividual/ConceptInstance
		sameAs : NNEstimator
		enables : avalanche_danger_level_estimator/avalanche_prediction_service
		hasInput : NN_model/alpine3d_interpolation_model
	rabbit_mq
		type : Thing/DTComponent/Enabler/FidelityThing/ContainedElement/ImplementationThing/Component/DescribedThing/NamedIndividual/ConceptInstance
		sameAs : rabbit_mq
		IsCommEnabler : true
Models :
	pt_model
		type : Thing/DTComponent/Model/FidelityThing/ContainedElement/ImplementationThing/Component/DescribedThing/Input/NamedIndividual/ConceptInstance
		sameAs : pt_model
		inputTo : simulator
	NN_model
		type : Thing/DTComponent/Model/FidelityThing/ContainedElement/ImplementationThing/Component/DescribedThing/Input/NamedIndividual/ConceptInstance
		sameAs : NN_model
		inputTo : alpine3d/NNEstimator
	alpine3d_interpolation_model
		type : Thing/DTComponent/Model/FidelityThing/ContainedElement/ImplementationThing/Component/DescribedThing/Input/NamedIndividual/ConceptInstance
		sameAs : alpine3d_interpolation_model
		inputTo : alpine3d/NNEstimator
	env_model
		type : Thing/DTComponent/Model/FidelityThing/ContainedElement/ImplementationThing/Component/DescribedThing/Input/NamedIndividual/ConceptInstance
		sameAs : env_model
		inputTo : simulator
	pt_and_env_model
		type : Thing/DTComponent/Model/FidelityThing/ContainedElement/ImplementationThing/Component/DescribedThing/Input/NamedIndividual/ConceptInstance
		sameAs : pt_and_env_model
		inputTo : simulator
ProvidedThings :
	real_time_viz
		type : ConnectionComponent/Thing/Insight/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/ProvidedThing/NamedIndividual/ConceptInstance
		sameAs : real_time_viz
		desc : 3D visualization of the Alps
		hasTimeScale : rt
		providedBy : real_time_viz_service
	godot_viz
		type : ConnectionComponent/Thing/Insight/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/ProvidedThing/NamedIndividual/ConceptInstance
		sameAs : godot_viz
		hasTimeScale : slower_trt
	what_if_sim_results
		type : ConnectionComponent/Thing/Insight/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/ProvidedThing/NamedIndividual/ConceptInstance
		sameAs : what_if_sim_results
		desc :  what-if analysis of potential avalanches in risky zones
		hasTimeScale : faster_trt
		providedBy : avalanche_simulation
	avalanche_3d_simulation
		type : ConnectionComponent/Thing/Insight/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/ProvidedThing/NamedIndividual/ConceptInstance
		sameAs : avalanche_3d_simulation
		desc : simulation of the impacts of an avalanche in a specific area
		hasTimeScale : slower_trt
		providedBy : avalanche_danger_level_estimator
	future_avalanche_risk_estimation
		type : ConnectionComponent/Thing/Insight/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/ProvidedThing/NamedIndividual/ConceptInstance
		sameAs : future_avalanche_risk_estimation
		desc : estimation of the avalanche risk
		hasTimeScale : rt
		providedBy : avalanche_prediction_service
	avalanche_risk_map
		type : ConnectionComponent/Thing/Insight/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/ProvidedThing/NamedIndividual/ConceptInstance
		sameAs : avalanche_risk_map
		desc : avalanche_risk_map visualization of the current state and historical data
		hasTimeScale : rt
	notifications
		type : ConnectionComponent/Action/Thing/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/ProvidedThing/AutomaticEnabledThing/NamedIndividual/ConceptInstance
		sameAs : notifications
		hasTimeScale : rt
		IsAutomatic : true
Data transmitted :
	imis_report
		type : ConnectionComponent/Thing/DataTransmitted/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/AutomaticEnabledThing/NamedIndividual/ConceptInstance
		sameAs : imis_report
		hasTimeScale : rt
		IsAutomatic : true
		producedFrom : imis
		asData : snow_profile_model
	slf_report
		type : ConnectionComponent/Thing/DataTransmitted/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/AutomaticEnabledThing/NamedIndividual/ConceptInstance
		sameAs : slf_report
		hasTimeScale : rt
		IsAutomatic : true
		producedFrom : meteo_station
	swissalti3d_raster
		type : ConnectionComponent/Thing/DataTransmitted/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/AutomaticEnabledThing/NamedIndividual/ConceptInstance
		sameAs : swissalti3d_raster
		hasTimeScale : immutable
		IsAutomatic : false
		producedFrom : lidar
Sensors :
	meteo_station
		type : ConnectionComponent/Thing/SensingComponent/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/NamedIndividual/ConceptInstance
		sameAs : meteo_station
		hasTimeScale : rt
		producedData : slf_report
	lidar
		type : ConnectionComponent/Thing/SensingComponent/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/NamedIndividual/ConceptInstance
		sameAs : lidar
		hasTimeScale : immutable
		producedData : swissalti3d_raster
	imis
		type : ConnectionComponent/Thing/SensingComponent/ContainedElement/ImplementationThing/Component/DescribedThing/TimeScaleThing/NamedIndividual/ConceptInstance
		sameAs : imis
		hasTimeScale : rt
		producedData : imis_report
