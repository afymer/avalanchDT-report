	alpine3d
		type : DTComponent/Thing/Enabler/NamedIndividual/ContainedElement/DescribedThing/FidelityThing/ImplementationThing/Component/ConceptInstance
		enables : avalanche_danger_level_estimator
		sameAs : alpine3d
		hasInput : NN_model/alpine3d_interpolation_model/snow_profile
	docker_volume_sharing
		type : DTComponent/Thing/Enabler/NamedIndividual/ContainedElement/DescribedThing/FidelityThing/ImplementationThing/Component/ConceptInstance
		enables : avalanche_simulation/real_time_viz_service
		IsCommEnabler : true
		sameAs : docker_volume_sharing
	simulator
		type : DTComponent/Thing/Enabler/NamedIndividual/ContainedElement/DescribedThing/FidelityThing/ImplementationThing/Component/ConceptInstance
		enables : avalanche_simulation
		sameAs : simulator
		hasInput : env_model/pt_and_env_model/pt_model/terrain_topography
	godot
		type : DTComponent/Thing/Enabler/NamedIndividual/ContainedElement/DescribedThing/FidelityThing/ImplementationThing/Component/ConceptInstance
		enables : real_time_viz_service
		sameAs : godot
	rabbit_mq
		type : DTComponent/Thing/Enabler/NamedIndividual/ContainedElement/DescribedThing/FidelityThing/ImplementationThing/Component/ConceptInstance
		enables : avalanche_simulation/real_time_viz_service
		IsCommEnabler : true
		sameAs : rabbit_mq
Models :
	NN_model
		type : DTComponent/Thing/Model/NamedIndividual/ContainedElement/DescribedThing/FidelityThing/ImplementationThing/Component/Input/ConceptInstance
		inputTo : NNEstimator/alpine3d
		sameAs : NN_model
	alpine3d_interpolation_model
		type : DTComponent/Thing/Model/NamedIndividual/ContainedElement/DescribedThing/FidelityThing/ImplementationThing/Component/Input/ConceptInstance
		inputTo : NNEstimator/alpine3d
		sameAs : alpine3d_interpolation_model
	env_model
		type : DTComponent/Thing/Model/NamedIndividual/ContainedElement/DescribedThing/FidelityThing/ImplementationThing/Component/Input/ConceptInstance
		inputTo : simulator
		sameAs : env_model
	pt_and_env_model
		type : DTComponent/Thing/Model/NamedIndividual/ContainedElement/DescribedThing/FidelityThing/ImplementationThing/Component/Input/ConceptInstance
