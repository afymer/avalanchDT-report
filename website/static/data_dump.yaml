		sameAs : safe_adaptation
	real_time_viz_service
		type : NamedIndividual/Component/Service/DTComponent/FidelityThing/ImplementationThing/TimeScaleThing/DescribedThing/ContainedElement/Thing/ConceptInstance
		atStage : operation
		enabledBy : godot
		provides : real_time_viz
