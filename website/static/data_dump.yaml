		sameAs : pt_and_env_model
	pt_model
		type : DTComponent/Thing/Model/NamedIndividual/ContainedElement/DescribedThing/FidelityThing/ImplementationThing/Component/Input/ConceptInstance
		inputTo : simulator
		sameAs : pt_model
ProvidedThings :
	avalanche_3d_simulation
		type : ConnectionComponent/Thing/Insight/NamedIndividual/ContainedElement/DescribedThing/ImplementationThing/Component/TimeScaleThing/ProvidedThing/ConceptInstance
		hasTimeScale : slower_trt
		desc : simulation of the impacts of an avalanche in a specific area
		sameAs : avalanche_3d_simulation
		providedBy : avalanche_danger_level_estimator
	future_avalanche_risk_estimation
		type : ConnectionComponent/Thing/Insight/NamedIndividual/ContainedElement/DescribedThing/ImplementationThing/Component/TimeScaleThing/ProvidedThing/ConceptInstance
		hasTimeScale : rt
		desc : estimation of the avalanche risk
		sameAs : future_avalanche_risk_estimation
		providedBy : avalanche_prediction_service
	avalanche_risk_map
		type : ConnectionComponent/Thing/Insight/NamedIndividual/ContainedElement/DescribedThing/ImplementationThing/Component/TimeScaleThing/ProvidedThing/ConceptInstance
		hasTimeScale : rt
		desc : avalanche_risk_map visualization of the current state and historical data
		sameAs : avalanche_risk_map
	what_if_sim_results
		type : ConnectionComponent/Thing/Insight/NamedIndividual/ContainedElement/DescribedThing/ImplementationThing/Component/TimeScaleThing/ProvidedThing/ConceptInstance
		hasTimeScale : faster_trt
		desc :  what-if analysis of potential avalanches in risky zones
		sameAs : what_if_sim_results
		providedBy : avalanche_simulation
	godot_viz
		type : ConnectionComponent/Thing/Insight/NamedIndividual/ContainedElement/DescribedThing/ImplementationThing/Component/TimeScaleThing/ProvidedThing/ConceptInstance
		hasTimeScale : slower_trt
		sameAs : godot_viz
	notifications
		type : ConnectionComponent/Action/Thing/NamedIndividual/ContainedElement/DescribedThing/ImplementationThing/Component/TimeScaleThing/ProvidedThing/AutomaticEnabledThing/ConceptInstance
		hasTimeScale : rt
		IsAutomatic : true
		sameAs : notifications
	real_time_viz
		type : ConnectionComponent/Thing/Insight/NamedIndividual/ContainedElement/DescribedThing/ImplementationThing/Component/TimeScaleThing/ProvidedThing/ConceptInstance
		hasTimeScale : rt
		desc : 3D visualization of the Alps
		sameAs : real_time_viz
		providedBy : real_time_viz_service
