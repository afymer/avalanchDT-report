		sameAs : two_para_model
	controller_model
		type : NamedIndividual/Component/DTComponent/FidelityThing/ImplementationThing/Input/DescribedThing/ContainedElement/Model/Thing/ConceptInstance
		inputTo : simulator/state_estimator/optimization_algs
		sameAs : controller_model
	env_model
		type : NamedIndividual/Component/DTComponent/FidelityThing/ImplementationThing/Input/DescribedThing/ContainedElement/Model/Thing/ConceptInstance
		inputTo : simulator
		sameAs : env_model
	pt_and_env_model
