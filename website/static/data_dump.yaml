ProvidedThings :
	dashboard_viz
		type : NamedIndividual/Component/ImplementationThing/TimeScaleThing/ProvidedThing/ConnectionComponent/DescribedThing/ContainedElement/Insight/Thing/ConceptInstance
		hasTimeScale : slower_trt
		sameAs : dashboard_viz
	real_time_viz
