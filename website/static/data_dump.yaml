		enabledBy : NNEstimator
	avalanche_simulation
		type : DTComponent/Thing/Service/NamedIndividual/ContainedElement/DescribedThing/FidelityThing/ImplementationThing/Component/TimeScaleThing/ConceptInstance
		atStage : operation
		provides : what_if_sim_results
		sameAs : avalanche_simulation
		enabledBy : docker_volume_sharing/simulator/rabbit_mq
	real_time_viz_service
