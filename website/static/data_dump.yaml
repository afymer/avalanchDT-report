		desc : 3D visualization of the current state
		providedBy : real_time_viz_service
		sameAs : real_time_viz
	what_if_sim_results
		type : NamedIndividual/Component/ImplementationThing/TimeScaleThing/ProvidedThing/ConnectionComponent/DescribedThing/ContainedElement/Insight/Thing/ConceptInstance
		hasTimeScale : faster_trt
		desc :  what-if analysis for future behavior under different controller configurations
		providedBy : avalanche_simulation
		sameAs : what_if_sim_results
	avalanche_3d_simulation
		type : NamedIndividual/Component/ImplementationThing/TimeScaleThing/ProvidedThing/ConnectionComponent/DescribedThing/ContainedElement/Insight/Thing/ConceptInstance
		hasTimeScale : slower_trt
		desc : anomaly detection
		providedBy : avalanche_danger_level_estimator
		sameAs : avalanche_3d_simulation
	future_avalanche_risk_estimation
		type : NamedIndividual/Component/ImplementationThing/TimeScaleThing/ProvidedThing/ConnectionComponent/DescribedThing/ContainedElement/Insight/Thing/ConceptInstance
		hasTimeScale : rt
		desc : state estimation of the heater
		providedBy : avalanche_prediction_service
		sameAs : future_avalanche_risk_estimation
	avalanche_risk_map
		type : NamedIndividual/Component/ImplementationThing/TimeScaleThing/ProvidedThing/ConnectionComponent/DescribedThing/ContainedElement/Insight/Thing/ConceptInstance
		hasTimeScale : rt
		desc : avalanche_risk_map visualization of the current state and historical data
		sameAs : avalanche_risk_map
	controller_control
		type : NamedIndividual/Component/ImplementationThing/TimeScaleThing/ProvidedThing/AutomaticEnabledThing/ConnectionComponent/Action/DescribedThing/ContainedElement/Thing/ConceptInstance
		hasTimeScale : rt
