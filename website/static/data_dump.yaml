		providedBy : safe_adaptation/policy_optimization
		sameAs : controller_control
	commands
		type : NamedIndividual/Component/ImplementationThing/TimeScaleThing/ProvidedThing/AutomaticEnabledThing/ConnectionComponent/Action/DescribedThing/ContainedElement/Thing/ConceptInstance
