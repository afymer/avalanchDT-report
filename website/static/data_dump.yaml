		sameAs : real_time_viz_service
	policy_optimization
		type : NamedIndividual/Component/Service/DTComponent/FidelityThing/ImplementationThing/TimeScaleThing/DescribedThing/ContainedElement/Thing/ConceptInstance
		atStage : operation
		enabledBy : dashboard_enabler
		provides : controller_control
		sameAs : policy_optimization
	avalanche_danger_level_estimator
