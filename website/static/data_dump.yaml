Services :
	avalanche_danger_level_estimator
		type : DTComponent/Thing/Service/NamedIndividual/ContainedElement/DescribedThing/FidelityThing/ImplementationThing/Component/TimeScaleThing/ConceptInstance
		atStage : operation
		provides : avalanche_3d_simulation
		sameAs : avalanche_danger_level_estimator
		enabledBy : NNEstimator/alpine3d
	avalanche_prediction_service
		type : DTComponent/Thing/Service/NamedIndividual/ContainedElement/DescribedThing/FidelityThing/ImplementationThing/Component/TimeScaleThing/ConceptInstance
		atStage : operation
		provides : future_avalanche_risk_estimation
