		sameAs : real_time_viz_service
		enabledBy : docker_volume_sharing/godot/rabbit_mq
Enablers :
	NNEstimator
		type : DTComponent/Thing/Enabler/NamedIndividual/ContainedElement/DescribedThing/FidelityThing/ImplementationThing/Component/ConceptInstance
		enables : avalanche_danger_level_estimator/avalanche_prediction_service
		sameAs : NNEstimator
